name: Release

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "release = bump+tag(+publish) · publish-only = current package.json version to npm"
        required: true
        type: choice
        default: release
        options:
          - release
          - publish-only
      bump:
        description: Semver bump type (release mode only)
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
      publish_npm:
        description: Publish to npm (release mode; always on for publish-only)
        required: true
        type: boolean
        default: true
      dry_run:
        description: npm publish --dry-run only (no git push / no real publish)
        required: true
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: ${{ inputs.mode }} (${{ inputs.mode == 'publish-only' && 'no bump' || inputs.bump }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Pack check
        run: npm pack --dry-run

      - name: Configure git identity
        if: ${{ inputs.mode == 'release' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version (${{ inputs.bump }})
        id: bump
        if: ${{ inputs.mode == 'release' }}
        run: |
          set -euo pipefail
          NEW_VERSION="$(npm version "${{ inputs.bump }}" -m "chore(release): v%s")"
          NEW_VERSION="${NEW_VERSION#v}"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumped to ${NEW_VERSION}"

      - name: Read current version
        id: current
        if: ${{ inputs.mode == 'publish-only' }}
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing existing version ${VERSION} (no bump)"

      - name: Resolve version outputs
        id: meta
        run: |
          set -euo pipefail
          if [ "${{ inputs.mode }}" = "release" ]; then
            echo "version=${{ steps.bump.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ steps.bump.outputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ steps.current.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ steps.current.outputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Push commit and tag
        if: ${{ inputs.mode == 'release' && !inputs.dry_run }}
        run: |
          set -euo pipefail
          git push origin "HEAD:${GITHUB_REF_NAME}"
          git push origin "${{ steps.meta.outputs.tag }}"

      - name: Verify npm auth
        if: ${{ inputs.mode == 'publish-only' || inputs.publish_npm }}
        run: |
          set -euo pipefail
          # setup-node writes ~/.npmrc with ${NODE_AUTH_TOKEN}; fail fast if secret is wrong
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NODE_AUTH_TOKEN is empty — check repo secret NPM_TOKEN" >&2
            exit 1
          fi
          npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: ${{ inputs.mode == 'publish-only' || inputs.publish_npm }}
        run: |
          set -euo pipefail
          echo "Publishing pi-web-chat@${{ steps.meta.outputs.version }} (mode=${{ inputs.mode }})"
          # Explicit auth line avoids setup-node / granular-token edge cases
          cat > "${RUNNER_TEMP}/.npmrc-publish" <<EOF
          //registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}
          registry=https://registry.npmjs.org/
          always-auth=true
          EOF
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npm publish --dry-run --access public --userconfig "${RUNNER_TEMP}/.npmrc-publish"
          else
            npm publish --access public --userconfig "${RUNNER_TEMP}/.npmrc-publish"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        if: ${{ always() }}
        run: |
          {
            echo "## Release"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **mode** | \`${{ inputs.mode }}\` |"
            echo "| **version** | \`${{ steps.meta.outputs.version }}\` |"
            echo "| **tag** | \`${{ steps.meta.outputs.tag }}\` |"
            echo "| **bump** | \`${{ inputs.mode == 'release' && inputs.bump || '—' }}\` |"
            echo "| **npm publish** | \`${{ inputs.mode == 'publish-only' || inputs.publish_npm }}\` |"
            echo "| **dry_run** | \`${{ inputs.dry_run }}\` |"
            echo "| **branch** | \`${GITHUB_REF_NAME}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
